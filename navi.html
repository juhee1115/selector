<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <style>
    a {
      text-decoration: none;
      color: aliceblue;
    }
    .container {
      width: 960px;
      margin: 0 auto;
      background-color: antiquewhite;
    }
    .navi > ul {
      display: flex;
    }
    .navi li {
      width: calc(100% / 4);
    }
    .navi > ul > li > a {
      color: aliceblue;
      background-color: black;
      text-align: center;
      display: block;
      width: 100%;
      padding: 10px;
    }
    .navi > ul > li > a:hover {
      background-color: bisque;
    }
     .navi > ul > li > a:focus{
        background-color: #333;
     }
      .navi > ul > li > a:visited{
        color: red;
        text-decoration: underline;
      }
      .navi > ul > li > a:active{
        background-color: blue;
      }
  </style>
  <body>
    <div class="container">
      <nav class="navi">
        <ul>
          <li><a href="#">이용 안내</a></li>
          <li><a href="#">객실 소개</a></li>
          <li><a href="#">예약 방법 및 요금</a></li>
          <li><a href="#">예약하기</a></li>
        </ul>
      </nav>
    </div>
  </body>
</html>
